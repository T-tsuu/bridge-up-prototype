<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dashboard — Bridge Up</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div id="nav"></div>
    <div class="page-content">
        <div
            style="background:var(--blue);border-radius:14px;padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
            <div>
                <div style="color:var(--muted);font-size:14px;margin-bottom:4px">Welcome back 👋</div>
                <h2 style="color:#fff;margin-bottom:8px" id="wName">–</h2>
                <div id="xpBar"></div>
            </div>
            <div style="display:flex;gap:20px;flex-wrap:wrap">
                <div style="text-align:center">
                    <div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:28px;color:var(--yellow)"
                        id="sApps">–</div>
                    <div style="color:var(--muted);font-size:13px">Applications</div>
                </div>
                <div style="text-align:center">
                    <div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:28px;color:var(--yellow)"
                        id="sJobs">–</div>
                    <div style="color:var(--muted);font-size:13px">Completed</div>
                </div>
                <div style="text-align:center">
                    <div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:28px;color:var(--yellow)"
                        id="sCerts">–</div>
                    <div style="color:var(--muted);font-size:13px">Certificates</div>
                </div>
            </div>
        </div>
        <div class="layout-sidebar">
            <div class="sidebar">
                <div class="sidebar-item active" onclick="showSec('feed',this)">📊 Dashboard</div>
                <div class="sidebar-item" onclick="showSec('jobs',this)">🔍 Explore Jobs</div>
                <div class="sidebar-item" onclick="location.href='marketplace.html'">🛒 Marketplace</div>
                <div class="sidebar-item" onclick="location.href='student-profile.html'">👤 My Profile</div>
                <div class="sidebar-item" onclick="location.href='chat.html'">💬 Messages</div>
                <div class="sidebar-item" onclick="location.href='certificate.html'">📜 Certificates</div>
            </div>
            <div>
                <div id="sec-feed">
                    <div
                        style="background:linear-gradient(90deg,#FFFBEB,#FFF7ED);border:1.5px solid var(--yellow);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
                        <span style="font-size:28px">💡</span>
                        <div style="flex:1">
                            <div
                                style="font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;color:var(--blue)">
                                Complete your profile to unlock better matches!</div>
                            <div style="font-size:13px;color:#64748B;margin-top:2px">Add skills and bio to earn +50 XP.
                            </div>
                        </div>
                        <a href="student-profile.html"><button class="btn btn-primary btn-sm">Complete
                                Profile</button></a>
                    </div>
                    <div class="section-header">
                        <h2>🎯 Recommended For You</h2><a href="job-listing.html"
                            style="color:var(--orange);font-size:14px;font-weight:600">See All →</a>
                    </div>
                    <div id="feedJobs" class="grid-2"></div>
                    <div class="section-header" style="margin-top:32px">
                        <h2>📅 Recent Activity</h2>
                    </div>
                    <div class="card">
                        <div id="activity" style="display:flex;flex-direction:column;gap:12px"></div>
                    </div>
                </div>
                <div id="sec-jobs" style="display:none">
                    <div class="section-header">
                        <h2>Explore Jobs</h2>
                    </div>
                    <div class="search-bar" style="margin-bottom:12px">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" id="jSearch" placeholder="Search jobs, skills, companies…"
                            oninput="filterJobs()" />
                    </div>
                    <div class="filter-row" id="fRow"></div>
                    <div id="jobsGrid" class="grid-2"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="translations.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script>
        I18N.init();
        let student;
        window.addEventListener("DOMContentLoaded", () => {
            const s = Auth.requireAuth(["student"]); if (!s) return;
            document.getElementById("nav").innerHTML = buildNavbar("Dashboard", "student");
            student = BridgeDB.getStudentById(s.id) || BridgeDB.students[0];
            document.getElementById("wName").textContent = student.name;
            document.getElementById("sApps").textContent = student.applications;
            document.getElementById("sJobs").textContent = student.completedJobs;
            document.getElementById("sCerts").textContent = student.certificates;
            document.getElementById("xpBar").innerHTML = renderXPBar(student.xp);
            document.getElementById("feedJobs").innerHTML = BridgeDB.getRecommendedJobs(student.id, 6).map(renderJobCard).join("");
            document.getElementById("activity").innerHTML = [
                { i: "📨", t: "You applied to <strong>Marketing Intern</strong> at Djezzy", d: "2 hours ago" },
                { i: "⭐", t: "New review from <strong>Cevital</strong>", d: "Yesterday" },
                { i: "🏆", t: "Earned <span class='job-xp'>+200 XP</span> for completing an internship", d: "3 days ago" },
                { i: "📜", t: "Certificate for <strong>HR Assistant</strong> is ready", d: "1 week ago" },
            ].map(a => `<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #F1F5F9"><span style="font-size:20px">${a.i}</span><div><div style="font-size:14px">${a.t}</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">${a.d}</div></div></div>`).join("");
            const types = ["All", ...new Set(BridgeDB.jobs.map(j => j.type))];
            document.getElementById("fRow").innerHTML = types.map(t => `<div class="filter-chip ${t === "All" ? "active" : ""}" onclick="applyFilter('${t}',this)">${t}</div>`).join("");
            document.getElementById("jobsGrid").innerHTML = BridgeDB.getRecommendedJobs(student.id, 40).map(renderJobCard).join("");
        });
        function filterJobs() { const q = document.getElementById("jSearch").value, ac = document.querySelector("#fRow .active")?.textContent; const f = ac && ac !== "All" ? { type: ac } : {}; document.getElementById("jobsGrid").innerHTML = BridgeDB.searchJobs(q, f).slice(0, 40).map(renderJobCard).join(""); }
        function applyFilter(t, el) { document.querySelectorAll("#fRow .filter-chip").forEach(c => c.classList.remove("active")); el.classList.add("active"); document.getElementById("jobsGrid").innerHTML = BridgeDB.searchJobs("", t === "All" ? {} : { type: t }).slice(0, 40).map(renderJobCard).join(""); }
        function showSec(n, el) { document.querySelectorAll('[id^="sec-"]').forEach(e => e.style.display = "none"); document.getElementById("sec-" + n).style.display = "block"; document.querySelectorAll(".sidebar-item").forEach(e => e.classList.remove("active")); el.classList.add("active"); }
    </script>
</body>

</html>
